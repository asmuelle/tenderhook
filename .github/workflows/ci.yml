name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      # Used only once the repo is bootstrapped; idle (but healthy) in docs-only mode.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tenderhook
          POSTGRES_PASSWORD: tenderhook
          POSTGRES_DB: tenderhook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tenderhook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://tenderhook:tenderhook@localhost:5432/tenderhook_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Check bootstrap status
        id: guard
        run: |
          if [ -f package.json ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json not found — docs-only scaffold, skipping install/build/test (CI stays green by design)."
          fi

      - name: Install dependencies
        if: steps.guard.outputs.bootstrapped == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run full CI gate (lint + typecheck + test + build)
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just ci
