services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tenderhook
      POSTGRES_PASSWORD: tenderhook
      POSTGRES_DB: tenderhook
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tenderhook']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
