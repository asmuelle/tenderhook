<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Tenderhook — Never miss a winnable bid again.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/>
      <stop offset="0.55" stop-color="#0D2747"/>
      <stop offset="1" stop-color="#091A31"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="20%" r="70%">
      <stop offset="0" stop-color="#F4B740" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F4B740" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD479"/>
      <stop offset="1" stop-color="#F4B740"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E88C7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#36C2A8" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#5E83B0" stroke-opacity="0.10" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- brand mark: hook over a ballot box -->
  <g transform="translate(80,72)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#0B1F3A" stroke="#36C2A8" stroke-opacity="0.6" stroke-width="2"/>
    <rect x="14" y="22" width="28" height="20" rx="3" fill="none" stroke="#7FE3D0" stroke-width="2.4"/>
    <line x1="22" y1="22" x2="34" y2="22" stroke="#0B1F3A" stroke-width="4"/>
    <path d="M28 8 a8 8 0 0 1 8 8 v6" fill="none" stroke="url(#amber)" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="28" cy="8" r="2.6" fill="url(#amber)"/>
  </g>
  <text x="152" y="110" font-family="'Space Grotesk',Arial,sans-serif" font-size="34" font-weight="700" fill="#EAF1FA" letter-spacing="0.5">Tenderhook</text>

  <!-- headline -->
  <text x="80" y="270" font-family="'Space Grotesk',Arial,sans-serif" font-size="74" font-weight="700" fill="#F4F8FD" letter-spacing="-1.5">Never miss a</text>
  <text x="80" y="352" font-family="'Space Grotesk',Arial,sans-serif" font-size="74" font-weight="700" letter-spacing="-1.5"><tspan fill="#F4F8FD">winnable </tspan><tspan fill="url(#amber)">bid</tspan><tspan fill="#F4F8FD"> again.</tspan></text>

  <text x="80" y="416" font-family="Arial,Helvetica,sans-serif" font-size="27" fill="#9FB6D2">A daily procurement radar for SMB government contractors —</text>
  <text x="80" y="452" font-family="Arial,Helvetica,sans-serif" font-size="27" fill="#9FB6D2">living dossiers, amendment red-lines, and pre-RFP signal.</text>

  <!-- pipeline strip -->
  <g transform="translate(80,508)">
    <rect x="0" y="0" width="1040" height="64" rx="14" fill="#0A2240" stroke="#5E83B0" stroke-opacity="0.18"/>

    <!-- tender chips -->
    <g font-family="'JetBrains Mono',monospace" font-size="15">
      <rect x="18" y="16" width="150" height="32" rx="8" fill="#10314f" stroke="#36C2A8" stroke-opacity="0.4"/>
      <text x="34" y="36" fill="#7FE3D0">SAM-9F12 · 96%</text>

      <rect x="184" y="16" width="168" height="32" rx="8" fill="#10314f" stroke="#5E83B0" stroke-opacity="0.3"/>
      <text x="200" y="36" fill="#C7D6EA">TX-SLED-0447 · 88%</text>

      <rect x="368" y="16" width="150" height="32" rx="8" fill="#2a1e08" stroke="#F4B740" stroke-opacity="0.5"/>
      <text x="384" y="36" fill="#FFD479">AMENDMENT 3</text>
    </g>

    <!-- countdown -->
    <text x="780" y="28" font-family="Arial,sans-serif" font-size="12" fill="#7C93B2" letter-spacing="2">CLOSES IN</text>
    <text x="780" y="52" font-family="'JetBrains Mono',monospace" font-size="22" font-weight="700" fill="#FFD479">04d 11h 22m</text>
  </g>
</svg>
